<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Split Scroll Continuum</title>
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        margin: 0;
      }
      #status {
        color: #444;
        margin-bottom: 10px;
        line-height: 1.4;
      }
      #status.error {
        color: #c00;
      }
      #action-btn {
        display: none;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #999;
        border-radius: 4px;
        background: #f5f5f5;
        width: 100%;
      }
      #action-btn:hover {
        background: #e8e8e8;
      }
      #action-btn.destructive {
        border-color: #c00;
        color: #c00;
      }
      #action-btn.destructive:hover {
        background: #fff0f0;
      }
      #pause-btn {
        display: none;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #999;
        border-radius: 4px;
        background: #f5f5f5;
        width: 100%;
        margin-top: 6px;
      }
      #pause-btn:hover {
        background: #e8e8e8;
      }
      #split-badge {
        display: none;
        font-size: 11px;
        color: #0066cc;
        margin-bottom: 6px;
      }
      #sync-warning {
        display: none;
        font-size: 11px;
        color: #c80;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div id="split-badge">Split View active</div>
    <div id="status">Loading…</div>
    <button id="action-btn" type="button"></button>
    <button id="pause-btn" type="button"></button>
    <div id="sync-warning"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
